/* ── Sparkline ── */
function Sparkline({data,color='var(--action-primary)',height=56}){
  const W=200,H=height,mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1,pad=H*.12;
  const pts=data.map((v,i)=>[(i/(data.length-1))*W,H-pad-((v-mn)/rng)*(H-pad*2)]);
  const ln=pts.map((p,i)=>`${i?'L':'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const days=['L','M','M','J','V','S','D'];
  return(<div>
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height,display:'block'}}>
      <defs><linearGradient id="spk" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".18"/><stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <path d={`${ln} L${W},${H} L0,${H} Z`} fill="url(#spk)"/>
      <path d={ln} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={i===data.length-1?4:2.5}
        fill={i===data.length-1?color:'transparent'} stroke={i===data.length-1?'none':color} strokeWidth="1.5"/>)}
    </svg>
    <div style={{display:'flex',justifyContent:'space-between',padding:'4px 1px 0'}}>
      {days.map((d,i)=><span key={i} style={{fontFamily:'var(--font-sans)',fontSize:10,
        color:i===days.length-1?color:'var(--text-muted)',fontWeight:i===days.length-1?700:400}}>{d}</span>)}
    </div>
  </div>);
}

/* ── getMostCriticalReading — picks the sensor that most needs attention ──
   Priority: critical > warn > ok. Tie-break: temp > humidity > co2.        ── */
function getMostCriticalReading(s){
  const SCORE={ok:0,warn:1,critical:2};
  const sensors=[
    {value:s.temp, unit:'°C',  tone:s.temp>35?'critical':s.temp>28?'warn':'ok',  pri:3},
    {value:s.hum,  unit:'%',   tone:s.hum>20?'critical':s.hum>16?'warn':'ok',    pri:2},
    {value:s.co2,  unit:'ppm', tone:s.co2>800?'critical':s.co2>600?'warn':'ok',  pri:1},
  ];
  return sensors.sort((a,b)=>SCORE[b.tone]-SCORE[a.tone]||b.pri-a.pri)[0];
}

    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   SCREEN 3 — Alerts List
   ═══════════════════════════════════════════════════════════════════════════ */
function AlertsScreen({alerts,nav}){
  const [tab,setTab]=React.useState('todas');
  const active  =alerts.filter(a=>a.status==='active');
  const critical=alerts.filter(a=>a.status==='active'&&a.variant==='critical');
  const warnings=alerts.filter(a=>a.status==='active'&&a.variant==='warning');
  const resolved=alerts.filter(a=>a.status==='resolved');
  const list=tab==='todas'?alerts:tab==='criticas'?critical:tab==='advertencias'?warnings:resolved;
  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--surface-app)'}}>
      <div style={{padding:'16px 16px 12px',flexShrink:0}}>
        <h1 style={{fontFamily:'var(--font-sans)',fontSize:26,fontWeight:700,color:'var(--text-primary)',letterSpacing:'-0.3px',margin:0}}>Alertas</h1>
      </div>
      <div style={{padding:'0 16px 12px',flexShrink:0}}>
        <Tabs items={[
          {id:'todas',        label:'Todas',        count:alerts.length},
          {id:'criticas',     label:'Críticas',     count:critical.length},
          {id:'advertencias', label:'Advertencias', count:warnings.length},
          {id:'resueltas',    label:'Resueltas',    count:resolved.length},
        ]} activeId={tab} onChange={setTab}/>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'0 16px 16px'}}>
        {list.length===0
          ?<EmptyState variant={tab==='resueltas'?'empty':'no-alerts'} size="sm"
              title={tab==='todas'?'Sin alertas':tab==='criticas'?'Sin alertas críticas':tab==='advertencias'?'Sin advertencias':'Sin resueltas'}
              body={tab==='todas'?'Todos los silos están en orden.':tab==='resueltas'?'Aún no resolviste ninguna alerta.':'No hay alertas de este tipo en la temporada.'}/>
          :<div style={{display:'flex',flexDirection:'column',gap:8}}>
            {list.map(a=>(
              <AlertCard key={a.id} variant={a.variant} title={a.title} silo={a.silo}
                time={a.time} description={a.desc} action={a.action} estimate={a.estimate}
                resolutionNote={a.resolutionNote}
                onClick={a.status==='active'?()=>nav('alert-detail',{alert:a}):undefined}/>
            ))}
          </div>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   SCREEN 4 — Alert Detail
   ═══════════════════════════════════════════════════════════════════════════ */
const RESOLUTION_ACTIONS=[
  {id:'aire',label:'Encendí aireación'},
  {id:'insp',label:'Inspeccioné el silo'},
  {id:'tec', label:'Llamé al técnico'},
  {id:'otro',label:'Otro'},
];

function AlertDetailScreen({alert,nav,onResolve,offline=false}){
  const [open,  setOpen]  =React.useState(false);
  const [picked,setPicked]=React.useState('');
  const [note,  setNote]  =React.useState('');

  const cr=alert.variant==='critical';

  const confirm=()=>{
    setDone(true);
    setOpen(false);
    setTimeout(()=>onResolve(alert.id,note||picked),350);

  return(

          </span>

            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}}>

              <span style={{fontFamily:'var(--font-sans)',fontSize:12,color:'var(--text-secondary)'}}>{alert.time}</span>

            <h2 style={{fontFamily:'var(--font-sans)',fontSize:17,fontWeight:700,color:'var(--text-primary)',letterSpacing:'-0.2px',margin:'0 0 3px'}}>{alert.title}</h2>

          </div>
        </div>

        {/* reading vs threshold — ThresholdStat mirrors SensorStat exactly */}
        <div>
          <span style={LBL}>Lectura registrada</span>

        {/* ¿Qué está pasando? */}

          </div>
        </div>

        {/* ¿Dónde? */}
        <div>
          <span style={LBL}>¿Dónde?</span>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',
            background:'var(--surface-card)',border:'1px solid var(--border-default)',
            borderRadius:'var(--radius-md)'}}>
            <span style={{display:'flex',flexShrink:0,color:'var(--text-secondary)'}}><Icon name="map-pin" size={16}/></span>

          </div>

        {alert.estimate&&(
          <div>

              background:'rgba(239,68,68,.06)',border:'1px solid var(--status-critical)',borderRadius:'var(--radius-md)'}}>

            </div>
          </div>

        {alert.action&&(
          <div>

              background:'var(--surface-input)',border:'1px solid var(--border-default)',
              borderRadius:'var(--radius-md)'}}>
              <span style={{display:'flex',flexShrink:0,color:'var(--action-primary)'}}><Icon name="info" size={16}/></span>
              <span style={{fontFamily:'var(--font-sans)',fontSize:14,fontWeight:500,color:'var(--text-primary)'}}>{alert.action}</span>

          <Button key="no" variant="ghost"     style={{width:'100%'}} onClick={()=>setOpen(false)}>Cancelar</Button>,
        ]}>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>

            {RESOLUTION_ACTIONS.map(o=>(
              <button key={o.id} onClick={()=>setPicked(o.label)} style={{
                display:'flex',alignItems:'center',gap:12,padding:'11px 14px',
                background:picked===o.label?'var(--green-tint)':'var(--surface-input)',

          <div>
            <span style={{...LBL,marginBottom:6}}>Notas (opcional)</span>

        </div>
      </BottomSheet>
    </div>
  );

const WIFI_NETS=[{id:'w1',name:'Red_campo_01',sig:3},{id:'w2',name:'SiloNet_Pro',sig:2},{id:'w3',name:'Red_campo_02',sig:2},{id:'w4',name:'iPhone de Lucas',sig:1}];
const GRAIN_OPTS=['Soja','Maíz','Trigo','Girasol','Otro'];

function AgregarSiloScreen({nav,onAdd}){
  const [step,setStep]=React.useState(1);
  const [sub,setSub]=React.useState('qr');
  const [scan,setScan]=React.useState('idle');
  const [wifi,setWifi]=React.useState(null);
  const [pass,setPass]=React.useState('');
  const [conn,setConn]=React.useState(false);
  const [nombre,setNombre]=React.useState('');
  const [tipo,setTipo]=React.useState('Silo fijo');
  const [tons,setTons]=React.useState('');
  const [fechaAcopio,setFechaAcopio]=React.useState(new Date().toISOString().slice(0,10));
  const [grano,setGrano]=React.useState('Soja');
  const [granoCustom,setGranoCustom]=React.useState('');
  const [saving,setSaving]=React.useState(false);
  const [saved,setSaved]=React.useState(false);

  const simulateScan=()=>{
    setScan('scanning');
    setTimeout(()=>{setScan('ok');setTimeout(()=>setSub('wifi'),600);},1400);
  };
  const connectWifi=()=>{
    setConn(true);
    setTimeout(()=>{setConn(false);setStep(2);},1600);
  };
  const saveSilo=()=>{
    if(!nombre.trim())return;
    setSaving(true);
    setTimeout(()=>{
      setSaving(false);setSaved(true);
      const finalGrano=grano==='Otro'&&granoCustom.trim()?granoCustom.trim():grano;
      onAdd&&onAdd({id:Date.now(),name:nombre,storage:tipo,tons:Number(tons)||0,grain:finalGrano,storedOn:fechaAcopio,status:'ok',temp:22,hum:13,co2:410,trend:[22,22,22,22,22,22,22],lastUpdate:'Ahora'});
      setTimeout(()=>nav('dashboard'),700);
    },1200);
  };

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'var(--surface-app)'}}>
      <BackHeader title="Agregar silo" onBack={()=>nav('dashboard')}/>

      <div style={{padding:'12px 16px 8px',flexShrink:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>

        <span style={{fontFamily:'var(--font-sans)',fontSize:12,color:'var(--text-muted)'}}>
          {step===1?(sub==='qr'?'Paso 1 de 2 — Escaneo QR':'Paso 1 de 2 — Conexión WiFi'):'Paso 2 de 2 — Datos del silo'}

      <div style={{flex:1,overflowY:'auto',padding:16}}>

              <span style={{fontFamily:'var(--font-sans)',fontSize:13,color:'var(--text-secondary)'}}>El código QR está impreso en el lateral de la lanza SiloGuard.</span>

                    <div style={{width:56,height:56,borderRadius:'50%',background:'rgba(34,197,94,.15)',border:'2px solid var(--action-primary)',display:'flex',alignItems:'center',justifyContent:'center'}}>

/* ── Toast helper ── */
let _toastId=1;
function useAppToasts(){
  const [toasts,setToasts]=React.useState([]);
  const add=React.useCallback((tone,title,message)=>{
    const id=_toastId++;
    setToasts(p=>[...p.slice(-2),{id,tone,title,message}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),3800);
  },[]);
  const dismiss=React.useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  return{toasts,add,dismiss};
}

function ToastOverlay({toasts,onDismiss}){
  return(
    <div style={{position:'fixed',bottom:80,left:'50%',transform:'translateX(-50%)',zIndex:2000,display:'flex',flexDirection:'column',gap:8,width:'min(360px,calc(100vw - 32px))',pointerEvents:'none'}}>
      {toasts.map(t=>(
        <div key={t.id} style={{pointerEvents:'all',animation:'toastSlide .25s ease both'}}>
          <Toast tone={t.tone} title={t.title} message={t.message} onDismiss={()=>onDismiss(t.id)}/>
        </div>
      ))}
      <style>{`@keyframes toastSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}`}</style>
    </div>
  );
}

            onDelete={id=>{const nm=silos.find(s=>s.id===id)?.name||'Silo';setSilos(prev=>prev.filter(s=>s.id!==id));toast.add('info','Silo eliminado',`${nm} fue eliminado.`);}}/>}
          {screen==='dashboard'    &&<DashboardScreen silos={silos} alerts={alerts} nav={nav}
                                        producerName={t.producerName} showBanner={t.showBanner}
                                        farmName={profileData.farm?.name||'Mi establecimiento'} connState={t.connState}/>}
          {screen==='silo'         &&selSilo&&<SiloScreen silo={selSilo} alerts={alerts} nav={nav}
                                        lote={lotes.find(l=>l.siloId===selSilo.id&&l.status==='monitoring')}
                                        onIniciarLote={s=>setIniciarLoteSilo(s)}
                                        deviceState={selSilo.id===2?t.deviceState:'ok'}
                                        onFinalizarLote={l=>setFinalizarLoteTarget(l)}/>}
          {screen==='alerts'       &&<AlertsScreen alerts={alerts} nav={nav}/>}
          {screen==='alert-detail' &&selAlt &&<AlertDetailScreen alert={selAlt} nav={nav} onResolve={resolve} offline={t.connState!=='online'}/>}
          {screen==='contacto-tecnico' &&selAlt &&<ContactoTecnicoScreen alert={selAlt} nav={nav} connState={t.connState} availability={t.techAvailability}/>}
          {screen==='historial'  &&selSilo&&<HistorialScreen silo={selSilo} nav={nav} initialVariable={initialVar}/>}
          {screen==='calidad'&&<PasaporteListScreen nav={nav} lotes={lotes} silos={silos}/>}
          {screen==='pasaporte'&&selLote&&<PasaporteDetailScreen lote={selLote} silos={silos} nav={nav}/>}
          {screen==='perfil'&&<ProfileScreen profile={profileData} siloCount={SILOS.length} variant={t.profileVariant} nav={nav}/>}
          {screen==='edit-profile'&&<EditProfileScreen profile={profileData} onSave={setProfileData} nav={nav}/>}
          {screen==='notifications'&&<NotificationsScreen settings={profileData.notifications} onChange={(k,v)=>setProfileData(p=>({...p,notifications:{...p.notifications,[k]:v}}))} nav={nav}/>}
          {screen==='devices'&&<DevicesScreen devices={profileData.devices} nav={nav}/>}
          {screen==='umbrales'&&<UmbralesScreen silos={silos} preselectedSilo={umbralesSilo} onBack={()=>nav(umbralesSilo?'silo':'perfil',umbralesSilo?{silo:umbralesSilo}:{})}/>}
        </div>
        {showNav&&<NavBar active={navTab} tabs={navTabs} onChange={id=>{setNavTab(id);nav(id==='alertas'?'alerts':id==='calidad'?'calidad':id);}}/>}
      </PhoneFrame>
      <ToastOverlay toasts={toast.toasts} onDismiss={toast.dismiss}/>
      <IniciarLoteSheet open={!!iniciarLoteSilo} onClose={()=>setIniciarLoteSilo(null)} silo={iniciarLoteSilo} onConfirm={iniciarLote}/>
      <FinalizarLoteConfirm open={!!finalizarLoteTarget} onClose={()=>setFinalizarLoteTarget(null)} lote={finalizarLoteTarget} onConfirm={finalizarLote}/>

      <TweaksPanel>
        <TweakSection label="Productor"/>
        <TweakText   label="Nombre"        value={t.producerName} onChange={v=>setTweak('producerName',v)}/>
        <TweakSection label="Pantalla inicial"/>
        <TweakRadio  label="Inicio en"     value={t.startScreen}
                     options={['dashboard','alertas']}
                     onChange={v=>{setTweak('startScreen',v);nav(v==='alertas'?'alerts':'dashboard');}}/>
        <TweakSection label="Dashboard"/>
        <TweakToggle label="Mostrar banner" value={t.showBanner} onChange={v=>setTweak('showBanner',v)}/>
        <TweakSection label="Perfil"/>
        <TweakRadio label="Mi perfil" value={t.profileVariant} options={[{value:'propuesta',label:'Propuesta'},{value:'actual',label:'Actual'}]} onChange={v=>{setTweak('profileVariant',v);nav('perfil');}}/>
        <TweakSection label="Pasaporte de calidad"/>
        <TweakRadio label="Estado del lote (demo)" value={t.loteEstadoDemo}
          options={['monitoring','finalized']}
          onChange={v=>{
            setTweak('loteEstadoDemo',v);
            const base=lotes.find(l=>l.status===v)||lotes[0];
            nav('pasaporte',{lote:base});
          }}/>
        <TweakSection label="Estados especiales"/>
        <TweakRadio label="Conexión del celular" value={t.connState}
          options={['online','offline-recent','offline-prolonged']}
          onChange={v=>{
            setTweak('connState',v);
            if(v==='online'&&t.connState!=='online') toast.add('ok','Conexión restablecida','Los datos se actualizaron correctamente.');
            nav('dashboard');
          }}/>
        <TweakRadio label="Lanza de Silo Sur" value={t.deviceState}
          options={['ok','device-offline-recent','device-offline-prolonged']}
          onChange={v=>{setTweak('deviceState',v);nav('silo',{silo:silos.find(s=>s.id===2)||silos[0]});}}/>
        <TweakSection label="Contacto con técnico"/>
        <TweakRadio label="Disponibilidad" value={t.techAvailability}
          options={['auto','en-horario','fuera-de-horario']}
          onChange={v=>{setTweak('techAvailability',v);nav('contacto-tecnico',{alert:selAlt||ALERTS_INIT[0]});}}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
