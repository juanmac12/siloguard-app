<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../../styles.css">
</helmet>
<div style="background:var(--surface-card); border:1px solid var(--border-default); border-radius:var(--radius-lg); padding:24px 20px 20px; display:flex; flex-direction:column; align-items:center; text-align:center; gap:14px; box-shadow:0 20px 60px rgba(0,0,0,0.5); box-sizing:border-box;">
  <div style="width:56px; height:56px; border-radius:999px; background:var(--green-tint); display:flex; align-items:center; justify-content:center; flex-shrink:0;">
    <x-import component-from-global-scope="SiloGuardDesignSystem_633342.Icon" name="{{ icon }}" size="26" color="var(--green)" hint-size="26px,26px"></x-import>
  </div>
  <h2 style="margin:0; font-family:var(--font-sans); font-size:19px; font-weight:700; color:var(--text-primary);">{{ title }}</h2>
  <p style="margin:0; font-family:var(--font-sans); font-size:14px; line-height:1.5; color:var(--text-secondary);">{{ desc }}</p>
  <dc-import name="AuthStepDots" total="{{ total }}" active="{{ step }}" hint-size="200px,38px"></dc-import>
  <div style="width:100%;">
    <x-import component-from-global-scope="SiloGuardDesignSystem_633342.Button" full-width="{{ true }}" on-click="{{ onNext }}" hint-size="100%,48px">{{ buttonLabel }}</x-import>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:350,&quot;height&quot;:300},&quot;icon&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Tu Dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;desc&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Descripción breve del paso.&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;step&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;min&quot;:0,&quot;max&quot;:3,&quot;tsType&quot;:&quot;number&quot;},&quot;total&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:4,&quot;min&quot;:2,&quot;max&quot;:6,&quot;tsType&quot;:&quot;number&quot;},&quot;buttonLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Siguiente&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onNext&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return {
      icon: this.props.icon ?? 'info',
      title: this.props.title ?? '',
      desc: this.props.desc ?? '',
      step: this.props.step ?? 0,
      total: this.props.total ?? 4,
      buttonLabel: this.props.buttonLabel ?? 'Siguiente',
      onNext: this.props.onNext ?? (() => {}),
    };
  }
}

</script>
</body>
</html>
