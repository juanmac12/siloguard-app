services:
  db:
    image: postgres:16
    container_name: siloguard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siloguard}
      POSTGRES_USER: ${POSTGRES_USER:-siloguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siloguard_dev_pw}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siloguard} -d ${POSTGRES_DB:-siloguard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: siloguard-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@siloguard.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-siloguard_dev_pw}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgadmin-data:
