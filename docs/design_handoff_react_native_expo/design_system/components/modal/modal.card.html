<!-- @dsCard group="Components" viewport="700x300" name="Modal / BottomSheet" subtitle="Centred overlay · bottom sheet · animated enter/exit" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--spec-bg); padding: 28px 24px; }
  .row  { display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
  .col  { display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }
  .lbl  { font-family: var(--font-sans); font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .note { font-family: var(--font-sans); font-size: 11px; color: var(--text-muted); margin-top: 24px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Modal, BottomSheet, Button } = window.SiloGuardDesignSystem_633342;

    function Demo() {
      const [modalOpen,  setModalOpen]  = React.useState(false);
      const [sheetOpen,  setSheetOpen]  = React.useState(false);

      return (
        <>
          <div className="row">
            <div className="col">
              <div className="lbl">Modal — confirmación</div>
              <Button variant="secondary" size="md" onClick={() => setModalOpen(true)}>
                Abrir Modal ↗
              </Button>
            </div>
            <div className="col">
              <div className="lbl">Bottom Sheet — acción</div>
              <Button variant="secondary" size="md" onClick={() => setSheetOpen(true)}>
                Abrir Bottom Sheet ↑
              </Button>
            </div>
          </div>

          <p className="note">
            Backdrop click · tecla ESC · botón ✕ cierran el overlay. Animación de entrada y salida incluida.
          </p>

          <Modal
            open={modalOpen}
            onClose={() => setModalOpen(false)}
            title="Eliminar silo"
            actions={[
              <Button key="cancel"  variant="ghost"  size="sm" onClick={() => setModalOpen(false)}>Cancelar</Button>,
              <Button key="confirm" variant="danger" size="sm" onClick={() => setModalOpen(false)}>Sí, eliminar</Button>,
            ]}
          >
            <p style={{ margin: 0, color: 'var(--text-secondary)', fontFamily: 'var(--font-sans)', fontSize: 'var(--text-body)', lineHeight: 'var(--lh-body)' }}>
              ¿Estás seguro que querés eliminar{' '}
              <strong style={{ color: 'var(--text-primary)' }}>Silo Norte</strong>?
              {' '}Esta acción no se puede deshacer y perderás todos los datos históricos asociados.
            </p>
          </Modal>

          <BottomSheet
            open={sheetOpen}
            onClose={() => setSheetOpen(false)}
            title="Acciones del silo"
            actions={[
              <Button key="archive" variant="secondary" fullWidth onClick={() => setSheetOpen(false)}>Archivar silo</Button>,
              <Button key="delete"  variant="danger"    fullWidth onClick={() => setSheetOpen(false)}>Eliminar silo</Button>,
              <Button key="cancel"  variant="ghost"     fullWidth onClick={() => setSheetOpen(false)}>Cancelar</Button>,
            ]}
          >
            <p style={{ margin: 0, color: 'var(--text-secondary)', fontFamily: 'var(--font-sans)', fontSize: 'var(--text-body)', lineHeight: 'var(--lh-body)' }}>
              Seleccioná una acción para{' '}
              <strong style={{ color: 'var(--text-primary)' }}>Silo Norte</strong>.
            </p>
          </BottomSheet>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
