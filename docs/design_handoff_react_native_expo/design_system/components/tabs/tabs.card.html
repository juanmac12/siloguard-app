<!-- @dsCard group="Components" viewport="700x240" name="Tabs" subtitle="Underline nav · pill filter · count badges" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--spec-bg); padding: 24px; }
  .grid  { display: flex; flex-direction: column; gap: 28px; }
  .label { font-family: var(--font-sans); font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; }
</style>
</head>
<body>
  <div id="root" class="grid"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Tabs } = window.SiloGuardDesignSystem_633342;

    const ALERT_TABS = [
      { id: 'activas',   label: 'Activas',   count: 4  },
      { id: 'resueltas', label: 'Resueltas', count: 12 },
      { id: 'historial', label: 'Historial'             },
    ];

    const FILTER_TABS = [
      { id: 'todos',       label: 'Todos'       },
      { id: 'critico',     label: 'Crítico'     },
      { id: 'advertencia', label: 'Advertencia' },
      { id: 'ok',          label: 'OK'          },
    ];

    function Demo() {
      const [tab1, setTab1] = React.useState('activas');
      const [tab2, setTab2] = React.useState('todos');
      return (
        <>
          <div>
            <div className="label">Underline — navegación principal</div>
            <Tabs items={ALERT_TABS} activeId={tab1} onChange={setTab1} />
          </div>
          <div>
            <div className="label">Pill — filtro secundario</div>
            <Tabs items={FILTER_TABS} activeId={tab2} onChange={setTab2} variant="pill" />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
