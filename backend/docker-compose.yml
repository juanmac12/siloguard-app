services:
  db:
    image: postgres:16
    container_name: siloguard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-siloguard}
      POSTGRES_USER: ${POSTGRES_USER:-siloguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siloguard_dev_pw}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siloguard} -d ${POSTGRES_DB:-siloguard}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
