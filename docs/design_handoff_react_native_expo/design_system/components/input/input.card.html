<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--spec-bg); padding: 24px; }
  #root { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; max-width: 640px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Icon } = window.SiloGuardDesignSystem_633342;
    function Demo() {
      const [show, setShow] = React.useState(false);
      return (
        <>
          <Input label="Email" placeholder="tu@email.com" />
          <Input label="Nombre del silo" defaultValue="Silo Norte" />
          <Input label="Tipo de grano" as="select" defaultValue="Soja" options={['Soja','Maíz','Trigo','Girasol']} />
          <Input label="Contraseña" type="password" defaultValue="123" error="Mínimo 8 caracteres" />
          <Input
            label="Contraseña"
            type={show ? 'text' : 'password'}
            defaultValue="Silobolsa2026"
            trailingIcon={
              <button type="button" onClick={() => setShow((s) => !s)} style={{ background: 'none', border: 'none', padding: 0, display: 'flex', cursor: 'pointer', color: 'inherit' }}>
                <Icon name={show ? 'eye-off' : 'eye'} size={18} />
              </button>
            }
          />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
