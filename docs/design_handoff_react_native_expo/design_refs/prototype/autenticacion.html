  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

;\n  font-display: swap;\n  src: url(\"85d117d5-77e6-40ce-aec6-e7c83e2d7a00\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"fc9d98d4-3ed3-42e8-a6e8-67afe5532efe\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"912def23-a11a-498a-8a53-ce59a65c59a2\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b8f35c39-809c-43c3-8700-ca001fe5f23e\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"6260fab3-376d-4f88-af1d-53c9cd0bd816\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5d2ee67e-6876-428d-b004-04220e08b21e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* SiloGuard — Color tokens\n   Source of truth: Figma › Foundations › Color Tokens (node 135:25).\n   SiloGuard is a dark-first product. The canvas is near-black, surfaces are\n   layered greys, and a single agronomic green carries brand + \"all healthy\".\n   Amber / Danger / Info are reserved strictly for grain-health status. */\n:root {\n  /* ---- Brand / primary ---------------------------------------------- */\n  --green: #22C55E;          /* primary · brand · \"estado OK\" (verde)        */\n  --green-600: #16A34A;      /* primary pressed / darker fill                */\n  --green-tint: rgba(34, 197, 94, 0.12); /* badge & highlight fills          */\n  --green-line: rgba(34, 197, 94, 0.30); /* dashed guides, focus rings       */\n\n  /* ---- Status (grain health) ---------------------------------------- */\n  --amber: #F59E0B;          /* advertencia · \"atención\" (amarillo)          */\n  --amber-tint: rgba(245, 158, 11, 0.12);\n  --danger: #EF4444;         /* crítica · \"riesgo\" (rojo)                    */\n  --danger-tint: rgba(239, 68, 68, 0.12);\n  --info: #3B82F6;           /* informativo · hints, tips                    */\n  --info-tint: rgba(59, 130, 246, 0.12);\n\n  /* ---- Neutrals / surfaces (dark) ----------------------------------- */\n  --bg: #0A0A0A;             /* app canvas                                    */\n  --surface: #111111;        /* cards, headers, nav bars                      */\n  --surface-2: #1A1A1A;      /* inputs, raised rows, inset fields             */\n  --surface-3: #262626;      /* hover surface / pressed rows                  */\n  --spec-bg: #0F0F0F;        /* specimen / documentation card backdrop        */\n  --border: #2A2A2A;         /* hairline dividers & control borders           */\n\n  /* ---- Text --------------------------------------------------------- */\n  --text: #F5F5F5;           /* primary text on dark                          */\n  --text-muted: #6B7280;     /* secondary text, labels, placeholders          */\n  --text-on-green: #0A0A0A;  /* text/icon sitting on a green fill             */\n}\n\n/* SiloGuard — Typography tokens\n   Source: Figma › Foundations › Escala Tipográfica (node 135:57).\n   One family — Inter — across the whole product. Tight tracking on large\n   display/heading sizes; relaxed, legible body sizing for field use. */\n:root {\n  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;\n\n  /* ---- Weights ---- */\n  --fw-regular: 400;   /* @kind font */\n  --fw-medium: 500;    /* @kind font */\n  --fw-semibold: 600;  /* @kind font */\n  --fw-bold: 700;      /* @kind font */\n\n  /* ---- Type scale: size · weight · letter-spacing · line-height ---- */\n  /* Display · 48 · 700 · -1.5 · 58 */\n  --text-display: 48px;\n  --lh-display: 58px;\n  --ls-display: -1.5px;\n\n  /* H1 · 32 · 700 · -0.5 · 40 */\n  --text-h1: 32px;\n  --lh-h1: 40px;\n  --ls-h1: -0.5px;\n\n  /* H2 · 24 · 600 · -0.3 · 30 */\n  --text-h2: 24px;\n  --lh-h2: 30px;\n  --ls-h2: -0.3px;\n\n  /* H3 · 18 · 600 · 0 · 26 */\n  --text-h3: 18px;\n  --lh-h3: 26px;\n  --ls-h3: 0px;\n\n  /* Body · 14 · 400 · 0 · 22 */\n  --text-body: 14px;\n  --lh-body: 22px;\n  --ls-body: 0px;\n\n  /* Caption · 12 · 400 · 0.8 · 16 */\n  --text-caption: 12px;\n  --lh-caption: 16px;\n  --ls-caption: 0.8px;\n\n  /* Label · 12 · 700 · 0.3 — form field labels, used throughout the app */\n  --text-label: 12px;\n  --ls-label: 0.3px;\n\n  /* Overline · 11 · 700 · 1.5 — uppercase section eyebrows (\"COLOR TOKENS\") */\n  --text-overline: 11px;\n  --ls-overline: 1.5px;\n}\n\n/* SiloGuard — Spacing tokens\n   Source: Figma › Foundations › Spacing · Base 8pt (node 135:72).\n   Strict 8pt grid (with a 4px half-step). Screen gutters are 24px;\n   stacked form fields sit on 16–24px rhythm. */\n:root {\n  --space-xs: 4px;    /* xs  — icon/text nudges, tight inline gaps          */\n  --space-sm: 8px;    /* sm  — inside chips, icon↔label                     */\n  --space-md: 16px;   /* md  — default element gap                          */\n  --space-lg: 24px;   /* lg  — screen gutter, section padding               */\n  --space-xl: 32px;   /* xl  — block separation                            */\n  --space-2xl: 48px;  /* 2xl — major section breaks                         */\n  --space-3xl: 64px;  /* 3xl — hero spacing                                */\n  --space-4xl: 96px;  /* 4xl — full-screen vertical centering              */\n\n  --screen-gutter: 24px;  /* canonical left/right padding on mobile screens */\n}\n\n/* SiloGuard — Border-radius tokens\n   Source: Figma › Foundations › Radios de borde (node 135:90).\n   Controls (buttons, inputs) use md (8px); cards use lg/xl (12–16px);\n   badges & pills use full. */\n:root {\n  --radius-none: 0px;\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 8px;    /* buttons, inputs                       */\n  --radius-lg: 12px;   /* cards, sheets                         */\n  --radius-xl: 16px;   /* large feature cards, status badges    */\n  --radius-2xl: 24px;  /* prominent containers                  */\n  --radius-full: 999px;/* pills, avatars, circular badges       */\n}\n\n/* SiloGuard — Elevation & glow tokens\n   Source: Figma › Foundations › Sombras (node 135:108).\n   On a near-black canvas, shadows read as soft depth halos. The green glow\n   is the brand's signature accent — used on success badges and active sensors. */\n:root {\n  --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.30);   /* row / chip lift            */\n  --shadow-md: 0 3px 12px rgba(0, 0, 0, 0.40);  /* cards                      */\n  --shadow-lg: 0 6px 24px rgba(0, 0, 0, 0.50);  /* sheets, modals, popovers   */\n  --glow-green: 0 4px 16px rgba(34, 197, 94, 0.30);  /* active / brand accent */\n  --glow-green-lg: 0 0 24px rgba(34, 197, 94, 0.30); /* success-state badge   */\n}\n\n/* SiloGuard — Semantic aliases\n   Component-facing names mapped onto the base palette. Author components and\n   screens against THESE so a base-token change ripples everywhere. */\n:root {\n  /* Surfaces & lines */\n  --surface-app: var(--bg);\n  --surface-card: var(--surface);\n  --surface-input: var(--surface-2);\n  --surface-hover: var(--surface-3);\n  --border-default: var(--border);\n  --border-strong: #3A3A3A;\n\n  /* Text */\n  --text-primary: var(--text);\n  --text-secondary: var(--text-muted);\n  --text-link: var(--green);\n  --text-inverse: var(--text-on-green);\n\n  /* Brand / primary action */\n  --action-primary: var(--green);\n  --action-primary-hover: var(--green-600);\n  --action-primary-text: var(--text-on-green);\n\n  /* Status — grain health */\n  --status-ok: var(--green);\n  --status-ok-tint: var(--green-tint);\n  --status-warn: var(--amber);\n  --status-warn-tint: var(--amber-tint);\n  --status-critical: var(--danger);\n  --status-critical-tint: var(--danger-tint);\n  --status-info: var(--info);\n  --status-info-tint: var(--info-tint);\n\n  /* Focus */\n  --focus-ring: 0 0 0 2px var(--bg), 0 0 0 4px var(--green);\n\n  /* Motion — calm, functional. No bounce; quick eases. */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --dur-fast: 120ms;  /* @kind other */\n  --dur-base: 180ms;  /* @kind other */\n  --dur-slow: 280ms;  /* @kind other */\n}\n\n/* SiloGuard — Base layer\n   Minimal resets + the canonical type ramp as reusable classes. Screens and\n   cards opt into these; primitives style themselves with the tokens directly. */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  margin: 0;\n  background: var(--surface-app);\n  color: var(--text-primary);\n  font-family: var(--font-sans);\n  font-size: var(--text-body);\n  line-height: var(--lh-body);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---- Type ramp ---- */\n.sg-display {\n  font-size: var(--text-display); line-height: var(--lh-display);\n  letter-spacing: var(--ls-display); font-weight: var(--fw-bold);\n}\n.sg-h1 {\n  font-size: var(--text-h1); line-height: var(--lh-h1);\n  letter-spacing: var(--ls-h1); font-weight: var(--fw-bold);\n}\n.sg-h2 {\n  font-size: var(--text-h2); line-height: var(--lh-h2);\n  letter-spacing: var(--ls-h2); font-weight: var(--fw-bold);\n}\n.sg-h3 {\n  font-size: var(--text-h3); line-height: var(--lh-h3);\n  letter-spacing: var(--ls-h3); font-weight: var(--fw-semibold);\n}\n.sg-body {\n  font-size: var(--text-body); line-height: var(--lh-body);\n  font-weight: var(--fw-regular);\n}\n.sg-caption {\n  font-size: var(--text-caption); line-height: var(--lh-caption);\n  letter-spacing: var(--ls-caption); font-weight: var(--fw-regular);\n  color: var(--text-secondary);\n}\n.sg-label {\n  font-size: var(--text-label); letter-spacing: var(--ls-label);\n  font-weight: var(--fw-bold); color: var(--text-secondary);\n}\n.sg-overline {\n  font-size: var(--text-overline); letter-spacing: var(--ls-overline);\n  font-weight: var(--fw-bold); text-transform: uppercase;\n  color: var(--text-secondary);\n}\n\n<\u002Fstyle>\n  <script src=\"5897552d-03b2-4f9c-b15e-de29b0ea65c5\"><\u002Fscript>\n  <style>\n    @keyframes sg-spin { to { transform: rotate(360deg); } }\n    @keyframes sg-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }\n    body { margin: 0; }\n    a { color: var(--text-link); text-decoration: underline; }\n    a:hover { color: var(--action-primary-hover); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh; width:100%; background:#000; display:flex; align-items:center; justify-content:center; padding:32px; box-sizing:border-box;\">\n<div style=\"width:390px; height:844px; flex-shrink:0; background:var(--bg); display:flex; flex-direction:column; overflow:hidden; position:relative; font-family:var(--font-sans); border-radius:36px; border:1px solid var(--border-default); box-shadow:0 30px 80px rgba(0,0,0,0.6);\">\n\n  <dc-import name=\"AuthStatusBar\" hint-size=\"390px,44px\"><\u002Fdc-import>\n\n  <!-- ===================== Splash ===================== -->\n  <sc-if value=\"{{ screenIsSplash }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"flex:1; display:flex; flex-direction:
