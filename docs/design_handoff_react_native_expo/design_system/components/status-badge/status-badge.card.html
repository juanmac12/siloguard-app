<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; background: var(--spec-bg); padding: 24px; }
  #root { display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { StatusBadge, StatusDot } = window.SiloGuardDesignSystem_633342;
    function Demo() {
      return (
        <>
          <div className="row">
            <StatusBadge tone="critical" />
            <StatusBadge tone="warn" />
            <StatusBadge tone="ok" />
            <StatusBadge tone="resolved" />
            <StatusBadge tone="ok">Saludable</StatusBadge>
          </div>
          <div className="row" style={{gap:20}}>
            <StatusDot tone="ok" size={12} />
            <StatusDot tone="warn" size={12} />
            <StatusDot tone="critical" size={12} glow />
            <StatusDot tone="resolved" size={12} />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
