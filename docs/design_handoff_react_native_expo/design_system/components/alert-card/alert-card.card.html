<!DOCTYPE html>
<html lang="es">
<head>

            action="Encender aireación"
            onClick={() => {}}
          />

            variant="warning"
            title="Humedad en aumento"

            description="La humedad relativa superó el umbral configurado."

            action="Inspección presencial"
            onClick={() => {}}
          />

            variant="resolved"
            title="Calentamiento controlado"
            silo="Silo Oeste"
            time="ayer"
            resolutionNote="Aireación 4 h · valores normalizados"
          />
        </>

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
