<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../../styles.css">
</helmet>
<div style="display:flex; align-items:center; justify-content:center; gap:8px; padding:16px 0;">
  <sc-for list="{{ dots }}" as="dot" hint-placeholder-count="5">
    <sc-if value="{{ dot.isActive }}" hint-placeholder-val="{{ false }}">
      <span style="display:inline-block; height:6px; width:20px; border-radius:999px; background:var(--action-primary); transition:width 180ms cubic-bezier(0.4,0,0.2,1), background 180ms cubic-bezier(0.4,0,0.2,1);"></span>
    </sc-if>
    <sc-if value="{{ dot.isInactive }}" hint-placeholder-val="{{ true }}">
      <span style="display:inline-block; height:6px; width:6px; border-radius:999px; background:var(--border-strong); transition:width 180ms cubic-bezier(0.4,0,0.2,1), background 180ms cubic-bezier(0.4,0,0.2,1);"></span>
    </sc-if>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:38},&quot;total&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:2,&quot;max&quot;:8,&quot;tsType&quot;:&quot;number&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:0,&quot;min&quot;:0,&quot;max&quot;:7,&quot;tsType&quot;:&quot;number&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const total = this.props.total ?? 5;
    const active = this.props.active ?? 0;
    const dots = [];
    for (let i = 0; i < total; i++) {
      dots.push({ i, isActive: i === active, isInactive: i !== active });
    }
    return { dots };
  }
}
</script>
</body>
</html>
