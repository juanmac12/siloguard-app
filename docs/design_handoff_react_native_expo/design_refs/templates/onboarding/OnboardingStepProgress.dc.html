<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="../../styles.css">
</helmet>
<div style="padding:12px 24px 8px; flex-shrink:0; box-sizing:border-box;">
  <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
    <sc-for list="{{ items }}" as="item" hint-placeholder-count="3">
      <sc-if value="{{ item.isCircle }}" hint-placeholder-val="{{ true }}">
        <sc-if value="{{ item.isCircleFilled }}" hint-placeholder-val="{{ false }}">
          <div style="width:28px; height:28px; border-radius:999px; background:var(--action-primary); border:1px solid var(--action-primary); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 200ms, border-color 200ms;">
            <span style="font-family:var(--font-sans); font-size:12px; font-weight:700; color:#fff; line-height:1;">{{ item.n }}</span>
          </div>
        </sc-if>
        <sc-if value="{{ item.isCircleUnfilled }}" hint-placeholder-val="{{ true }}">
          <div style="width:28px; height:28px; border-radius:999px; background:var(--surface-input); border:1px solid var(--border-default); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 200ms, border-color 200ms;">
            <span style="font-family:var(--font-sans); font-size:12px; font-weight:700; color:var(--text-secondary); line-height:1;">{{ item.n }}</span>
          </div>
        </sc-if>
      </sc-if>
      <sc-if value="{{ item.isLine }}" hint-placeholder-val="{{ false }}">
        <sc-if value="{{ item.isLineFilled }}" hint-placeholder-val="{{ false }}">
          <div style="flex:1; height:2px; border-radius:2px; background:var(--action-primary); transition:background 300ms;"></div>
        </sc-if>
        <sc-if value="{{ item.isLineUnfilled }}" hint-placeholder-val="{{ true }}">
          <div style="flex:1; height:2px; border-radius:2px; background:var(--surface-input); transition:background 300ms;"></div>
        </sc-if>
      </sc-if>
    </sc-for>
  </div>
  <span style="font-family:var(--font-sans); font-size:var(--text-caption); color:var(--text-secondary);">{{ caption }}</span>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:64},&quot;step&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1,&quot;min&quot;:1,&quot;max&quot;:4,&quot;tsType&quot;:&quot;number&quot;},&quot;total&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:2,&quot;min&quot;:2,&quot;max&quot;:4,&quot;tsType&quot;:&quot;number&quot;},&quot;caption&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Paso 1 de 2 — Escaneo QR&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const step = this.props.step ?? 1;
    const total = this.props.total ?? 2;
    const items = [];
    for (let n = 1; n <= total; n++) {
      const filled = step >= n;
      items.push({ key: 'c' + n, isCircle: true, isLine: false, n, isCircleFilled: filled, isCircleUnfilled: !filled });
      if (n < total) {
        const lineFilled = step > n;
        items.push({ key: 'l' + n, isCircle: false, isLine: true, isLineFilled: lineFilled, isLineUnfilled: !lineFilled });
      }
    }
    return {
      items,
      caption: this.props.caption ?? '',
    };
  }
}

</script>
</body>
</html>
